name: Deploy CDK

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Develop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-sam-role
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup permissions
        run: chmod +x gradlew

      - name: Build project and zip lambda
        run: ./gradlew clean lambdaZip

      - name: Verify lambda zip generation
        run: ls -la build/libs/

      - name: CDK Bootstrap
        run: cdk bootstrap
        working-directory: infrastructure

      - name: CDK Deploy
        run: cdk deploy --require-approval never
        working-directory: infrastructure